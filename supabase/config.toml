# Supabase Configuration for Project

[api]
# Port to use for the API URL.
port = 54321

# Schemas to expose in your API. Tables, views and stored procedures in these schemas will get API
# endpoints. public and storage are always included.
schemas = ["public", "storage", "graphql_public"]

# Extra schemas to add to the search_path of every request. public is always included.
extra_search_path = ["public", "extensions"]

# The max number of rows returns from a view, table, or stored procedure. Limits payload size
# for accidental or malicious requests.
max_rows = 1000

[db]
# Port to use for the local database URL.
port = 54322
# The database driver to use: postgresql or supabase (PostgreSQL with a set of extensions).
driver = "supabase"
# Seed your database in development by uncommenting the seed_file config.
seed_file_path = "supabase/seed.sql"

[studio]
# Whether to use SSL for Studio during local development.
enabled = true

# Port to use for Supabase Studio.
port = 54323

# External URL of the API.
api_url = "http://localhost:54321"

# If this is enabled, the preview URL generated by `supabase link` will open in your browser
open_browser_on_start = true

[auth]
# The max period a session can be used, in seconds. Defaults to 604800 seconds (1 week)
max_session_duration = 604800

[functions]
# memory_id of a node.js function to schedule as a cron.
verify_jwt = true

[[external_functions.python.requirements]]
name = "supabase"
version = "2.1.0"
